name: package

on:
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-package:
    name: Build Linux-Packaged Bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install Webapp Dependencies
        working-directory: webapp
        run: npm ci

      - name: Run Go Tests
        run: go test ./...

      - name: Build Plugin Bundle
        run: make dist

      - name: Verify Executable Bits In Bundle
        run: |
          tar -tvf dist/*.tar.gz | awk '
            /server\/dist\/plugin-(linux|darwin)/ {
              checked++
              if ($1 !~ /^-rwx/) {
                print "missing executable bit: " $0
                exit 1
              }
            }
            END {
              if (checked != 4) {
                print "expected 4 linux/darwin binaries, got " checked
                exit 1
              }
            }
          '

      - name: Upload Plugin Bundle
        uses: actions/upload-artifact@v4
        with:
          name: plugin-bundle
          path: dist/*.tar.gz
          if-no-files-found: error

  github-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Bundle Artifact
        uses: actions/download-artifact@v4
        with:
          name: plugin-bundle
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*.tar.gz
          generate_release_notes: true
          overwrite_files: true
